apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: sysctl-mutator
webhooks:
  - name: sysctl-mutator.gromware.com
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "Namespaced"
    clientConfig:
      service:
        name: sysctl-mutator
        namespace: sysctl-mutator
        path: "/mutate"
        port: 443
      caBundle: "" # Needs to be populated by cert-manager or manual bootstrap
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 1
    failurePolicy: Ignore
    # Exclude the webhook's own namespace to prevent circular bootstrap lockouts
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: ["sysctl-mutator"]
