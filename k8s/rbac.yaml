apiVersion: v1
kind: Namespace
metadata:
  name: sysctl-mutator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sysctl-mutator
  namespace: sysctl-mutator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sysctl-mutator
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sysctl-mutator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sysctl-mutator
subjects:
  - kind: ServiceAccount
    name: sysctl-mutator
    namespace: sysctl-mutator
