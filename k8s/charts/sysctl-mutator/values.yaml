# Default values for sysctl-mutator.
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: ghcr.io/gheffern/sysctl-mutator
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Port for the webhook server (internal to container)
port: 8443

# Bind address for the webhook server
bindAddress: 0.0.0.0

# Low-Privilege / Zero-Cluster-RBAC Mode:
# When set to true, the namespace reflector/watcher is disabled.
# The webhook will run without requiring any cluster-wide Namespace read/watch permissions.
disableNamespaceReflector: false

# Cluster-wide fallback sysctls.
# Specified as a structured YAML map, which will be serialized to JSON in the template.
defaultSysctls:
  net.ipv4.ip_local_port_range: "1024 65000"

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# TLS Certificate Management
# The mutating webhook requires HTTPS.
# Mode can be:
# - 'selfsigned': Helm will automatically generate a self-signed CA and certificate.
#                 This uses a lookup hook to reuse certificates on upgrades.
# - 'cert-manager': Uses cert-manager Certificates. Requires cert-manager to be installed.
# - 'manual': You must provide your own secret containing the TLS cert and key.
tls:
  mode: selfsigned
  # Name of the TLS secret.
  # - For 'selfsigned', this will be generated automatically: <release-name>-certs
  # - For 'manual', this must point to your pre-created TLS secret containing tls.crt and tls.key.
  # - For 'cert-manager', this will be the name of the secret generated by cert-manager.
  secretName: ""
  # CA Bundle (base64-encoded PEM). Only used if mode is 'manual'.
  caBundle: ""
  
  certManager:
    # If mode is 'cert-manager', specify the Issuer/ClusterIssuer details
    issuerRef:
      name: selfsigned-issuer
      kind: Issuer
      group: cert-manager.io

# Webhook configuration details
webhook:
  failurePolicy: Ignore
  timeoutSeconds: 1
  # namespaceSelector decides which namespaces the webhook is executed for.
  # By default, only the release namespace is dynamically excluded to prevent circular bootstrap lockouts.
  namespaceSelector: {}
  objectSelector: {}
