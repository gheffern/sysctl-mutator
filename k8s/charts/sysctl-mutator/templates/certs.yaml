{{- if eq .Values.tls.mode "selfsigned" -}}
{{- include "sysctl-mutator.certs" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sysctl-mutator.tlsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sysctl-mutator.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  ca.crt: {{ $.sysctlMutatorCerts.ca }}
  tls.crt: {{ $.sysctlMutatorCerts.cert }}
  tls.key: {{ $.sysctlMutatorCerts.key }}
{{- end -}}

{{- if eq .Values.tls.mode "cert-manager" -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "sysctl-mutator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sysctl-mutator.labels" . | nindent 4 }}
spec:
  secretName: {{ include "sysctl-mutator.tlsSecretName" . }}
  dnsNames:
    - {{ include "sysctl-mutator.fullname" . }}
    - {{ include "sysctl-mutator.fullname" . }}.{{ .Release.Namespace }}
    - {{ include "sysctl-mutator.fullname" . }}.{{ .Release.Namespace }}.svc
    - {{ include "sysctl-mutator.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    {{- toYaml .Values.tls.certManager.issuerRef | nindent 4 }}
{{- end -}}
