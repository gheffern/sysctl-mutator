apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sysctl-mutator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sysctl-mutator.labels" . | nindent 4 }}
---
{{- if not .Values.disableNamespaceReflector }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sysctl-mutator.fullname" . }}
  labels:
    {{- include "sysctl-mutator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sysctl-mutator.fullname" . }}
  labels:
    {{- include "sysctl-mutator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sysctl-mutator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sysctl-mutator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
