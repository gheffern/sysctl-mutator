apiVersion: v1
kind: Service
metadata:
  name: {{ include "sysctl-mutator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sysctl-mutator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: https
      protocol: TCP
      name: https
    {{- if .Values.metrics.enabled }}
    - port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "sysctl-mutator.selectorLabels" . | nindent 4 }}
